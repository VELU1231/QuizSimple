<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QuizApp{% endblock %}</title>
  <meta name="description" content="{% block description %}Test your knowledge with our interactive quiz platform.{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head_extra %}{% endblock %}
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-logo">
    <span class="logo-icon">&#9670;</span>
    <span class="logo-text">QuizApp</span>
  </a>
  <div class="nav-links">
    {% block nav_extra %}
    <a href="/#how-it-works" class="nav-link">How It Works</a>
    {% endblock %}
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <p>&copy; 2026 QuizApp &mdash; Built with Flask &amp; passion.</p>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
